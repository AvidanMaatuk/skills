<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSAP timeline — pipeline sequence</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: #0f1115; font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .pipe { display: flex; align-items: center; gap: 0; }
  .stage {
    width: 92px; height: 92px; border-radius: 18px;
    display: grid; place-items: center; color: #aeb4c2;
    background: #1a1d24; border: 2px solid #2a2f3a;
    font-size: 13px; font-weight: 600; text-align: center;
    box-shadow: 0 8px 24px -12px rgba(0,0,0,.8);
  }
  .link { width: 54px; height: 4px; background: #2a2f3a; position: relative; border-radius: 2px; }
  .link .fill {
    position: absolute; inset: 0; width: 0%;
    background: linear-gradient(90deg,#5b8cff,#7af0c8); border-radius: 2px;
  }
</style>
</head>
<body>
  <div class="pipe">
    <div class="stage" data-stage>Parse</div>
    <div class="link"><div class="fill"></div></div>
    <div class="stage" data-stage>Validate</div>
    <div class="link"><div class="fill"></div></div>
    <div class="stage" data-stage>Transform</div>
    <div class="link"><div class="fill"></div></div>
    <div class="stage" data-stage>Emit</div>
  </div>

  <script src="../assets/gsap.min.js"></script>
  <script>
    // Each stage activates only after the previous one finishes and its
    // connector fills — the timeline IS the dependency order.
    const stages = gsap.utils.toArray("[data-stage]");
    const fills = gsap.utils.toArray(".fill");
    const active = { borderColor: "#7af0c8", color: "#eafff6", scale: 1.08, backgroundColor: "#10241d" };

    const tl = gsap.timeline({ repeat: -1, repeatDelay: 0.8, defaults: { ease: "power2.out" } });
    stages.forEach((stage, i) => {
      tl.to(stage, { ...active, duration: 0.4 });
      if (fills[i]) tl.to(fills[i], { width: "100%", duration: 0.45 }, "+=0.1");
    });
    // settle back to idle before looping
    tl.to(stages, { borderColor: "#2a2f3a", color: "#aeb4c2", scale: 1, backgroundColor: "#1a1d24", duration: 0.4 }, "+=0.5")
      .to(fills, { width: "0%", duration: 0.01 }, "<");

    gsap.matchMedia().add("(prefers-reduced-motion: reduce)", () => { tl.progress(0.45).pause(); });
  </script>
</body>
</html>
